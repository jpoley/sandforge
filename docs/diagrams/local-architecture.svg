<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="700" viewBox="0 0 1240 700"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arrPR" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrShip" markerWidth="12" markerHeight="12" refX="8.5" refY="4.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9.5,4.25 L0,8.5 Z" fill="#15803d"/>
    </marker>
  </defs>
  <rect width="1240" height="700" fill="#ffffff"/>

  <text x="36" y="44" font-size="22" font-weight="700" fill="#0f172a">One local git, two remotes — developers and agents work it through a local Forgejo, then ship to GitHub</text>

  <!-- ===== Local boundary ===== -->
  <rect x="24" y="112" width="1016" height="540" rx="22" fill="#fafbff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="2 6"/>
  <text x="44" y="142" font-size="15" font-weight="600" fill="#64748b">Your machine — everything runs locally</text>

  <!-- ===== Host Docker substrate zone (services run ON it) ===== -->
  <rect x="506" y="250" width="516" height="340" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="2" stroke-dasharray="3 5" opacity="0.9"/>
  <text x="524" y="278" font-size="15" font-weight="700" fill="#155e75">Host Docker daemon</text>

  <!-- ===== Editors: developers + agents ===== -->
  <rect x="44" y="250" width="196" height="292" rx="16" fill="#f7f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="142" y="282" font-size="17" font-weight="700" fill="#5b21b6" text-anchor="middle">Developers + AI agents</text>
  <text x="142" y="302" font-size="12.5" fill="#6b7280" text-anchor="middle">work the code together</text>
  <rect x="64" y="316" width="156" height="40" rx="10" fill="#fff8eb" stroke="#d97706" stroke-width="1.6"/>
  <text x="142" y="341" font-size="14.5" font-weight="600" fill="#92400e" text-anchor="middle">Developer</text>
  <rect x="64" y="362" width="156" height="40" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="142" y="387" font-size="14.5" font-weight="600" fill="#3b0764" text-anchor="middle">Claude Code</text>
  <rect x="64" y="408" width="156" height="40" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="142" y="433" font-size="14.5" font-weight="600" fill="#3b0764" text-anchor="middle">Codex CLI</text>
  <rect x="64" y="454" width="156" height="40" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="142" y="479" font-size="14.5" font-weight="600" fill="#3b0764" text-anchor="middle">Cursor / …</text>

  <!-- ===== Local git ===== -->
  <rect x="292" y="320" width="176" height="156" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="380" y="354" font-size="18" font-weight="700" fill="#3730a3" text-anchor="middle">Local git</text>
  <text x="380" y="378" font-size="12.5" fill="#475569" text-anchor="middle">bare clone +</text>
  <text x="380" y="396" font-size="12.5" fill="#475569" text-anchor="middle">a worktree per agent</text>
  <text x="380" y="422" font-size="12.5" font-weight="600" fill="#4338ca" text-anchor="middle">two remotes:</text>
  <text x="380" y="440" font-size="12" fill="#475569" text-anchor="middle">sandforge · origin</text>

  <!-- ===== Forgejo (on Docker) ===== -->
  <rect x="560" y="300" width="246" height="172" rx="16" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
  <text x="683" y="336" font-size="21" font-weight="700" fill="#1e3a8a" text-anchor="middle">Forgejo</text>
  <text x="683" y="359" font-size="14.5" font-weight="600" fill="#1d4ed8" text-anchor="middle">127.0.0.1:3000 · a local GitHub</text>
  <line x1="582" y1="370" x2="784" y2="370" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="683" y="391" font-size="13" fill="#334155" text-anchor="middle">pull requests + review threads</text>
  <text x="683" y="412" font-size="13" fill="#334155" text-anchor="middle">Actions — queues CI jobs · check-runs</text>
  <text x="683" y="433" font-size="13" fill="#334155" text-anchor="middle">the GitHub REST API + web UI</text>
  <text x="683" y="455" font-size="12" fill="#64748b" text-anchor="middle" font-style="italic">the GitHub PR workflow, on your machine</text>

  <!-- ===== act_runner (on Docker) ===== -->
  <rect x="560" y="506" width="190" height="68" rx="14" fill="#fff8eb" stroke="#d97706" stroke-width="2"/>
  <text x="655" y="533" font-size="17" font-weight="700" fill="#92400e" text-anchor="middle">act_runner</text>
  <text x="655" y="555" font-size="11.5" fill="#475569" text-anchor="middle">Forgejo Actions runner</text>

  <!-- ===== Local test stack (on Docker) ===== -->
  <rect x="792" y="506" width="210" height="68" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="897" y="533" font-size="15" font-weight="700" fill="#14532d" text-anchor="middle">Local test stack</text>
  <text x="897" y="555" font-size="11.5" fill="#475569" text-anchor="middle">deploy-target · LB·app·DB</text>

  <!-- editors -> local git : edit -->
  <line x1="240" y1="398" x2="288" y2="398" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="264" y="389" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">edit</text>

  <!-- local git -> forge : push (sandforge remote) -->
  <line x1="468" y1="384" x2="556" y2="384" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="512" y="375" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">push</text>

  <!-- editors -> forge : open PR + review (over the top) -->
  <polyline points="150,250 150,214 685,214 683,296" fill="none" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrPR)"/>
  <text x="410" y="206" font-size="12.5" font-weight="600" fill="#6d28d9" text-anchor="middle">open PR · review  (web UI + REST API)</text>

  <!-- local git -> GitHub : the second remote, straight from local git -->
  <polyline points="380,320 380,172 1135,172 1135,296" fill="none" stroke="#15803d" stroke-width="2.8" marker-end="url(#arrShip)"/>
  <text x="690" y="164" font-size="13" font-weight="700" fill="#15803d" text-anchor="middle">git push  main  →  origin   (local git → GitHub, direct)</text>

  <!-- runner polls forge for queued jobs (up) -->
  <line x1="624" y1="504" x2="624" y2="472" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="616" y="492" font-size="11.5" font-weight="600" fill="#334155" text-anchor="end">polls jobs</text>
  <!-- runner posts check status back (up) -->
  <line x1="692" y1="504" x2="692" y2="472" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="700" y="492" font-size="11.5" fill="#475569" text-anchor="start">posts status</text>
  <!-- runner -> test stack : deploy + e2e -->
  <line x1="750" y1="540" x2="788" y2="540" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="769" y="530" font-size="11" fill="#475569" text-anchor="middle">deploy · e2e</text>

  <!-- ===== GitHub (outside boundary) ===== -->
  <rect x="1058" y="300" width="158" height="130" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="1137" y="338" font-size="18" font-weight="700" fill="#14532d" text-anchor="middle">GitHub</text>
  <text x="1137" y="363" font-size="12.5" fill="#334155" text-anchor="middle">upstream · origin remote</text>
  <text x="1137" y="387" font-size="12" fill="#475569" text-anchor="middle" font-style="italic">the production target</text>
  <text x="1137" y="408" font-size="12" fill="#475569" text-anchor="middle" font-style="italic">prod creds, used here</text>

  <!-- ===== Bottom caption ===== -->
  <text x="48" y="616" font-size="14" font-weight="600" fill="#0f172a">Inner loop, all local: developers + agents open a PR on Forgejo · act_runner runs CI and posts check status · they review on the PR —</text>
  <text x="48" y="638" font-size="14" font-weight="600" fill="#0f172a">all via Forgejo's GitHub-shaped API. The same local git keeps GitHub as a second remote, so the finished branch ships straight there.</text>
</svg>
