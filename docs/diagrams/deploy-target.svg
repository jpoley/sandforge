<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="980" height="340" fill="#ffffff"/>

  <text x="40" y="46" font-size="22" font-weight="600" fill="#0f172a">Deploy-target stack — spun on demand at graduate</text>

  <!-- browser -->
  <rect x="32" y="158" width="150" height="92" rx="16" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="107" y="210" font-size="19" font-weight="600" fill="#1e293b" text-anchor="middle">browser</text>

  <!-- LB -->
  <rect x="246" y="158" width="150" height="92" rx="16" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
  <text x="321" y="202" font-size="19" font-weight="600" fill="#1e3a8a" text-anchor="middle">LB</text>
  <text x="321" y="226" font-size="14" fill="#475569" text-anchor="middle">one origin</text>

  <!-- frontend -->
  <rect x="470" y="92" width="220" height="84" rx="16" fill="#edfaf1" stroke="#15803d" stroke-width="2"/>
  <text x="580" y="128" font-size="18" font-weight="600" fill="#14532d" text-anchor="middle">frontend</text>
  <text x="580" y="152" font-size="14" fill="#475569" text-anchor="middle">React + Vite (static)</text>

  <!-- backend -->
  <rect x="470" y="228" width="220" height="84" rx="16" fill="#edfaf1" stroke="#15803d" stroke-width="2"/>
  <text x="580" y="264" font-size="18" font-weight="600" fill="#14532d" text-anchor="middle">backend</text>
  <text x="580" y="288" font-size="14" fill="#475569" text-anchor="middle">Go · net/http + chi</text>

  <!-- postgres -->
  <rect x="772" y="228" width="156" height="84" rx="16" fill="#f5f0ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="850" y="264" font-size="18" font-weight="600" fill="#5b21b6" text-anchor="middle">Postgres</text>
  <text x="850" y="288" font-size="14" fill="#475569" text-anchor="middle">16</text>

  <!-- arrows -->
  <line x1="184" y1="204" x2="238" y2="204" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M398,188 C434,160 440,140 462,134" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M398,220 C434,248 440,266 462,270" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="692" y1="270" x2="764" y2="270" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- path labels -->
  <text x="436" y="138" font-size="14" font-weight="600" fill="#334155" text-anchor="middle">/</text>
  <text x="412" y="248" font-size="14" font-weight="600" fill="#334155" text-anchor="middle">/api/*</text>
</svg>
